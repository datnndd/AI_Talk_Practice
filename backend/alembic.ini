# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# leave blank for local time
# timezone =

# max length of characters to use in "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a corresponding .py file to be listed as revisions
# sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, subsequent directories must be assigned
# version_path_separator = ;
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# the separator used when sending multiple values to
# inherit_version_ranks.  defaults to a single comma.
# version_rank_separator = ,

# set to 'true' to search for scripts recursively
# recursive_version_locations = false

# the separator used when sending multiple values to
# list_templates.  defaults to a single space.
# output_encoding = utf-8

sqlalchemy.url = sqlite+aiosqlite:///./ai_talk_practice.db

[post_write_hooks]
# post_write_hooks allows scripts to be run after completion of
# the 'revision' command.

# [hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

[logging]
default_handler_name = console

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
