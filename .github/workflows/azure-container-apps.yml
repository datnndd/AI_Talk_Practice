name: Deploy Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BACKEND_IMAGE_NAME: ai-talk-backend
  FRONTEND_IMAGE_NAME: ai-talk-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        run: |
          ACR_LOGIN_SERVER=$(az acr show \
            --name "${{ secrets.AZURE_ACR_NAME }}" \
            --query loginServer \
            --output tsv)
          echo "login_server=${ACR_LOGIN_SERVER}" >> "$GITHUB_OUTPUT"

      - name: ACR login
        run: az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Build backend image
        run: |
          docker build \
            --tag "${{ steps.acr.outputs.login_server }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}" \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg "VITE_API_URL=${{ secrets.VITE_API_URL }}" \
            --tag "${{ steps.acr.outputs.login_server }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}" \
            ./frontend

      - name: Push backend image
        run: docker push "${{ steps.acr.outputs.login_server }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"

      - name: Push frontend image
        run: docker push "${{ steps.acr.outputs.login_server }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_BACKEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.acr.outputs.login_server }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_FRONTEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.acr.outputs.login_server }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"
