<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

          extend: {

              "on-error": "#ffffff",
              "inverse-surface": "#2f3133",
              "surface": "#f9f9fc",
              "on-surface-variant": "#414753",
              "on-primary-fixed-variant": "#00458e",
              "inverse-primary": "#abc7ff",
              "tertiary-fixed-dim": "#ffb955",
              "primary": "#005ab6",
              "tertiary-container": "#a16900",
              "inverse-on-surface": "#f0f0f3",

              "on-surface": "#1a1c1e",
              "surface-container-low": "#f3f3f6",
              "error-container": "#ffdad6",
              "secondary-fixed": "#7efba4",
              "surface-container-high": "#e8e8ea",

              "surface-bright": "#f9f9fc",
              "on-secondary-container": "#007239",
              "on-primary-fixed": "#001b3f",
              "on-background": "#1a1c1e",
              "on-primary-container": "#fefcff",
              "surface-tint": "#005cba",
              "primary-container": "#1672df",
              "on-tertiary-fixed": "#291800",
              "tertiary": "#805200",
              "on-tertiary-container": "#fffbff",
              "error": "#ba1a1a",
              "outline-variant": "#c1c6d5"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-orb {
            background: linear-gradient(135deg, #1672df 0%, #005ab6 100%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="bg-[#f9f9fc] dark:bg-slate-950 flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto top-0 z-50">
<div class="text-xl font-extrabold text-[#005ab6] dark:text-blue-400 tracking-tighter font-headline">LingoFlow</div>
<div class="flex gap-4">
<button class="text-slate-500 dark:text-slate-400 hover:text-[#1672df] transition-colors scale-95 duration-200 flex items-center gap-1">
<span class="material-symbols-outlined text-lg">help</span>
</button>
<button class="text-slate-500 dark:text-slate-400 hover:text-[#1672df] transition-colors scale-95 duration-200">
<span class="material-symbols-outlined text-lg">close</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Liquid Glass Orb Background -->
<div class="absolute -right-20 top-1/2 -translate-y-1/2 w-[500px] h-[500px] liquid-orb rounded-full animate-pulse"></div>
<div class="absolute -left-40 top-1/4 w-[300px] h-[300px] bg-secondary/10 blur-[100px] rounded-full"></div>
<div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
<!-- Content Column -->
<div class="lg:col-span-5 space-y-8">
<div class="space-y-4">
<span class="inline-block px-3 py-1 bg-surface-variant text-on-surface-variant text-xs font-bold tracking-widest uppercase rounded-sm">Step 02/04</span>
<h1 class="text-5xl lg:text-7xl font-headline font-extrabold tracking-tight text-on-surface leading-[1.1]">
                        Tailor your <span class="text-primary">curriculum</span>
</h1>
<p class="text-lg text-on-surface-variant max-w-md leading-relaxed">
                        Select topics you enjoy. Our AI will personalize your learning path to match your specific interests.
                    </p>
</div>
<!-- Abstract Visual Indicator -->
<div class="hidden lg:flex items-center gap-6 p-6 bg-surface-container-low rounded-xl border border-outline-variant/10">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<div>
<div class="text-sm font-bold text-on-surface">Smart Personalization</div>
<div class="text-xs text-on-surface-variant">Your content evolves with your choices</div>
</div>
</div>
</div>
<!-- Bento Topic Grid Column -->
<div class="lg:col-span-7">
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<!-- Topic Card: Technology -->
<button class="group relative overflow-hidden p-6 rounded-xl bg-primary-container text-on-primary-container border-2 border-transparent transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-40">
<span class="material-symbols-outlined text-3xl opacity-80 group-hover:scale-110 transition-transform">terminal</span>
<span class="font-headline text-xl font-bold">Technology</span>
<div class="absolute top-4 right-4 bg-white/20 rounded-full p-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Topic Card: Business -->
<button class="group p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-40 text-left">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">payments</span>
<span class="font-headline text-xl font-bold">Business</span>
</button>
<!-- Topic Card: Art -->
<button class="group p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-40 text-left">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">palette</span>
<span class="font-headline text-xl font-bold">Art</span>
</button>
<!-- Topic Card: Science (Spanning 2 columns on tablet+) -->
<button class="group md:col-span-2 p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex items-center gap-6 h-32 text-left">
<div class="w-16 h-16 rounded-lg bg-surface-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">science</span>
</div>
<div class="flex flex-col">
<span class="font-headline text-xl font-bold">Science</span>
<span class="text-xs text-on-surface-variant">Biology, Physics, Chemistry</span>
</div>
</button>
<!-- Topic Card: Music -->
<button class="group p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-32 text-left">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">music_note</span>
<span class="font-headline text-xl font-bold">Music</span>
</button>
<!-- Topic Card: Gaming -->
<button class="group p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-32 text-left">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">sports_esports</span>
<span class="font-headline text-xl font-bold">Gaming</span>
</button>
<!-- Topic Card: Travel -->
<button class="group p-6 rounded-xl bg-primary-container text-on-primary-container border-2 border-transparent transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-32">
<span class="material-symbols-outlined text-3xl opacity-80 group-hover:scale-110 transition-transform">flight_takeoff</span>
<span class="font-headline text-xl font-bold">Travel</span>
<div class="absolute top-4 right-4 bg-white/20 rounded-full p-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Topic Card: Movies -->
<button class="group p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-32 text-left">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">movie</span>
<span class="font-headline text-xl font-bold">Movies</span>
</button>
<!-- Topic Card: History -->
<button class="group p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-32 text-left">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">history_edu</span>
<span class="font-headline text-xl font-bold">History</span>
</button>
<!-- Topic Card: Nature -->
<button class="group p-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/30 hover:border-primary/50 transition-all duration-300 flex flex-col justify-between aspect-square md:aspect-auto md:h-32 text-left">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-primary transition-colors">forest</span>
<span class="font-headline text-xl font-bold">Nature</span>
</button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 py-6 mb-safe bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-10px_30px_rgba(0,0,0,0.03)] shadow-2xl">
<!-- Inactive Nav: Skip -->
<button class="text-slate-500 dark:text-slate-400 px-6 py-3 font-['Inter'] font-medium text-sm hover:opacity-90 transition-opacity active:scale-98 duration-150">
            Skip
        </button>
<!-- Active Action: Continue -->
<button class="bg-[#ffddb4] text-[#a16900] rounded-xl px-8 py-3 font-['Inter'] font-bold text-sm shadow-sm flex items-center gap-2 hover:opacity-90 transition-opacity active:scale-98 duration-150 group">
            Continue
            <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</footer>

</div>
