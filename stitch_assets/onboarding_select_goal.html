<div class="w-14 h-14 rounded-full bg-primary-fixed-dim/30 flex items-center justify-center mb-12 transition-transform group-hover:scale-110 relative z-10">

</div>
<div class="mt-auto relative z-10">
<h3 class="font-headline text-2xl font-bold mb-3">Socialize with locals</h3>
<p class="text-on-surface-variant font-medium">Build friendships, understand culture, and speak naturally.</p>
</div>
